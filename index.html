<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#080c12" />
    <meta name="color-scheme" content="dark" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KasukuGames" />

    <!-- Microsoft -->
    <meta name="msapplication-TileColor" content="#080c12" />
    <meta name="msapplication-TileImage" content="/icon-192.png" />

    <!-- SEO -->
    <meta name="description" content="KasukuGames — Olympics of the Mind. 21 premium cognitive games: IQ, speed, creativity, medical reasoning, party & multiplayer. Train, compete, transcend." />
    <meta name="keywords" content="brain games, cognitive training, mental athletics, IQ games, party games, Tanzania, Kasuku" />
    <meta name="author" content="Laetoli" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="KasukuGames — Olympics of the Mind" />
    <meta property="og:description" content="21 premium cognitive games. Train working memory, processing speed, creativity, and strategic thinking. Compete with friends via WhatsApp." />
    <meta property="og:image" content="/icon-512.png" />
    <meta property="og:site_name" content="KasukuGames" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="KasukuGames — Olympics of the Mind" />
    <meta name="twitter:description" content="21 premium cognitive games. Train, compete, transcend." />
    <meta name="twitter:image" content="/icon-512.png" />

    <!-- Prevent phone number detection -->
    <meta name="format-detection" content="telephone=no" />

    <title>KasukuGames — Olympics of the Mind</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
